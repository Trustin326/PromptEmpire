<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Purchase Verification | Prompt Empire</title><link rel="stylesheet" href="styles.css"></head><body><section class="section" style="max-width:800px;margin:auto;text-align:center"><div style="font-size:70px">♛</div><h1 class="section-title" id="title">VERIFYING YOUR PURCHASE</h1><p class="section-sub" id="msg">We are securely checking your Stripe payment and preparing your delivery.</p><div id="result"></div><a class="btn" href="index.html">RETURN TO STORE</a></section><script src="config.js"></script><script>function aid(){try{const v=JSON.parse(localStorage.getItem("pe_affiliate")||"null");return v&&v.expires>Date.now()?v.id:""}catch(e){return""}}(async()=>{const s=new URLSearchParams(location.search).get("session_id");if(!s){title.textContent="PURCHASE REFERENCE MISSING";msg.textContent="Your payment may still be complete, but this page did not receive a Stripe Checkout Session ID.";return}if(!PROMPT_EMPIRE_CONFIG.backendUrl){title.textContent="BACKEND NOT CONFIGURED";msg.textContent="Add the deployed Apps Script Web App URL to config.js.";return}try{const r=await fetch(PROMPT_EMPIRE_CONFIG.backendUrl+"?action=verifyPurchase",{method:"POST",headers:{"Content-Type":"text/plain;charset=utf-8"},body:JSON.stringify({session_id:s,affiliate_id:aid()})}),d=await r.json();if(!d.ok)throw new Error(d.error||"Verification failed");title.textContent="PURCHASE VERIFIED";msg.textContent="Your Stripe payment was verified and your delivery record was created.";result.innerHTML=(d.purchases||[]).map(x=>`<div class="card" style="margin:15px 0"><strong>${x.name}</strong><p>${x.delivery_configured?"Your delivery email has been sent.":"The order is recorded, but the owner still needs to configure this product’s delivery URL."}</p></div>`).join("")}catch(e){title.textContent="WE COULDN’T COMPLETE AUTOMATIC DELIVERY";msg.textContent=e.message}}</script><script src="growth.js"></script></body></html>
