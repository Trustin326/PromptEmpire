<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Reviews | Prompt Empire</title><link rel="stylesheet" href="styles.css"></head><body><div class="topbar">PROMPT EMPIRE™ CUSTOMER REVIEWS</div><nav class="nav"><div class="brand"><span class="crown">♛</span><div><b>PROMPT EMPIRE</b><small>REVIEWS</small></div></div><div class="navlinks"><a href="index.html">STORE</a><a href="support.html">SUPPORT</a></div></nav><section class="section" style="max-width:850px;margin:auto"><h1 class="section-title">SHARE YOUR EXPERIENCE</h1><div class="card"><input id="n" class="search" style="width:100%;margin:7px 0" placeholder="Name"><input id="e" class="search" style="width:100%;margin:7px 0" type="email" placeholder="Purchase email"><input id="p" class="search" style="width:100%;margin:7px 0" placeholder="Product"><select id="r" class="search" style="width:100%;margin:7px 0"><option>5</option><option>4</option><option>3</option><option>2</option><option>1</option></select><textarea id="t" class="search" style="width:100%;min-height:140px;margin:7px 0" placeholder="Your review"></textarea><button id="go" class="btn">SUBMIT REVIEW</button><p id="out"></p></div></section><script src="backend-config.js"></script><script src="backend-adapter.js"></script><script>go.onclick=async()=>{let x=await PE_DB.call('create',{table:'reviews',row:{review_id:PE_UID('REV'),customer_name:n.value,customer_email:e.value,product_id:p.value,rating:Number(r.value),review_text:t.value,status:'pending',created_at:new Date().toISOString()}});out.textContent=x.ok?'Review submitted for moderation.':x.error}</script></body></html>
