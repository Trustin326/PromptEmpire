<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Support | Prompt Empire</title><link rel="stylesheet" href="styles.css"></head><body><div class="topbar">PROMPT EMPIRE™ SUPPORT CENTER</div><nav class="nav"><div class="brand"><span class="crown">♛</span><div><b>PROMPT EMPIRE</b><small>CUSTOMER SUPPORT</small></div></div><div class="navlinks"><a href="index.html">STORE</a><a href="customer.html">PURCHASE HISTORY</a><a href="reviews.html">REVIEWS</a></div></nav><section class="section" style="max-width:850px;margin:auto"><h1 class="section-title">HOW CAN WE HELP?</h1><div class="card"><input id="e" class="search" style="width:100%;margin:7px 0" type="email" placeholder="Purchase email"><input id="s" class="search" style="width:100%;margin:7px 0" placeholder="Subject"><textarea id="m" class="search" style="width:100%;min-height:150px;margin:7px 0" placeholder="Describe the issue"></textarea><button id="go" class="btn">SUBMIT REQUEST</button><p id="out"></p></div></section><script src="backend-config.js"></script><script src="backend-adapter.js"></script><script>go.onclick=async()=>{let r=await PE_DB.call('create',{table:'tickets',row:{ticket_id:PE_UID('TKT'),customer_email:e.value,subject:s.value,message:m.value,status:'open',created_at:new Date().toISOString()}});out.textContent=r.ok?'Support request submitted.':r.error}</script></body></html>
